<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>
            User Experience Design
        </title>
        <link rel="stylesheet" type="text/css" href="css/main.css" />
        <!-- Media query for narrow browser width -->
        <link
            rel="stylesheet"
            media="only screen and (max-width: 480px)"
            href="css/mobile.css"
        />

        <!-- Media query for medium browser width -->
        <link
            rel="stylesheet"
            media="only screen and (min-width: 481px) and (max-width: 960px)"
            href="css/tablet.css"
        />

        <!-- Media query for full browser width -->
        <link
            rel="stylesheet"
            media="only screen and (min-width: 961px)"
            href="css/desktop.css"
        />

        <!-- Prevent smartphones from scaling the page by default -->
        <meta name="viewport" content="initial-scale=1" />
    </head>
    <body>
        <div class="container">
            <header>
                <h1>User Experience Design</h1>
                <nav>
                    <h2>Page Navigation</h2>
                    <ul>
                        <li><a href="index.html">Home Page</a></li>
                    </ul>
                </nav>
            </header>
            <main> 
                <section class="prototype column1">
                    <h2>Clickable Protoype</h2>
                    <p>
                        <a href="https://www.figma.com/proto/FwzVDcGP724qOwVDVSrteO/Wireframe?node-id=5-66&p=f&t=pZlXrYtmu6M2qdc7-1&scaling=scale-down&content-scaling=fixed&page-id=0%3A1&starting-point-node-id=5%3A66" target="_blank">
                            View Clickable Prototype
                        </a>
                    </p>
                </section>
                <section class="wireframes column2">
                    <h2>Wireframes</h2>
                    <div class="wireframe_grid">
                        <img src="images/home.png" alt="Home wireframe" />
                        <img src="images/contact.png" alt="Contact wireframe" />
                        <img src="images/menu.png" alt="Menu wireframe" />
                        <img src="images/item_detail.png" alt="Item detail wireframe" />
                        <img src="images/cart.png" alt="Cart wireframe" />
                        <img src="images/checkout.png" alt="Checkout wireframe" />
                        <img src="images/about.png" alt="About Us wireframe" />
                        <img src="images/confirmation.png" alt="Confirmation wireframe" />
                    </div>
                </section>
                <section class="site_map column3">
                    <h2>Site Map</h2>
                    <img src="images/site_map.png" alt="Coffee shop website site map" />
                </section>
            </main>
            <footer>
                <p>Created by Andrew Gomez for Intro to Web Design.</p>
            </footer>
        </div>
    </body>
</html>
